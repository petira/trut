title: "Trut, z. s."
description: "Literatura nás baví."
lang: cs
locale: cs_CZ
timezone: Europe/Prague

url: "https://petira.github.io"
baseurl: "/trut"

logo: false

markdown: kramdown

future: true

collections:
  events:
    output: true
    permalink: /akce/:name/
  projects:
    output: true
    permalink: /projekty/:name/

defaults:
  - scope:
      path: ""
      type: events
      values:
      layout: event

  - scope:
      path: ""
      type: projects
      values:
      layout: project

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
