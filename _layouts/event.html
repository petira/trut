---
layout: default
---

<section class="section">

    <div class="container">

        <p>
            <a href="{{ '/akce/' | relative_url }}">
                ← Zpět na přehled akcí
            </a>
        </p>

        <h1>{{ page.title }}</h1>

        <p>
            <strong>Datum:</strong>
            {{ page.date | date: "%d.%m.%Y" }}
        </p>

        {% if page.location %}
        <p>
            <strong>Místo:</strong>
            {{ page.location }}
        </p>
        {% endif %}

        {{ content }}

    </div>

</section>
